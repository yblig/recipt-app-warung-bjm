<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung BJM - Premium POS</title>
    <style>
        /* ================= TAMPILAN PREMIUM BALI UTAMA ================= */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; 
            background: #121212; 
            color: #fff;
            padding: 15px; 
            margin: 0; 
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .bali-header {
            background: linear-gradient(180deg, #d4af37 0%, #aa7c11 100%);
            color: #111;
            padding: 15px 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .bali-header-text { text-align: left; }
        .bali-header h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .bali-header p { margin: 3px 0 0 0; font-size: 12px; font-weight: bold; }
        
        /* TOMBOL MENU PENGATURAN */
        .btn-setting-buka {
            background: #222;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-container { display: flex; flex-direction: column; gap: 10px; max-width: 480px; margin: 0 auto; }
        
        .btn-barang { 
            font-size: 16px; 
            padding: 16px; 
            background: #1e1e1e;
            color: white; 
            border: 2px solid #d4af37; 
            border-radius: 12px; 
            font-weight: bold; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 66px rgba(0,0,0,0.2);
            cursor: pointer;
        }
        .badge-harga { background: #d4af37; color: #111; padding: 4px 8px; border-radius: 6px; font-size: 14px; font-weight: 900; }

        /* DAFTAR KERANJANG DI LAYAR HP MAMA */
        .box-keranjang-layar {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            max-width: 450px;
            margin: 20px auto 10px auto;
            padding: 15px;
            text-align: left;
        }
        .box-keranjang-layar h4 { margin: 0 0 10px 0; color: #d4af37; border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 16px; }
        
        .item-keranjang-layar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #333;
        }
        
        .qty-control { display: flex; align-items: center; gap: 5px; }
        .btn-qty {
            background: #d4af37;
            color: #111;
            border: none;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        .input-qty {
            width: 45px;
            text-align: center;
            background: #000;
            color: #00f2fe;
            border: 1px solid #d4af37;
            padding: 4px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
        }

        .btn-hapus-item {
            background: #c0392b;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            margin-left: 5px;
        }

        .box-total { 
            background: #1a1a1a;
            border: 2px dashed #d4af37;
            padding: 15px; 
            border-radius: 12px; 
            max-width: 450px;
            margin: 10px auto; 
        }
        .box-total h2 { margin: 0; font-size: 22px; }
        #total-layar { color: #d4af37; font-weight: 900; }
        
        .btn-bayar { 
            font-size: 20px; 
            padding: 16px; 
            max-width: 480px;
            width: 100%;
            margin-top: 10px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: #111; 
            border: none; 
            border-radius: 30px; 
            font-weight: 900; 
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            cursor: pointer;
        }

        /* ================= MODAL HALAMAN PENGATURAN SUPER PREMIUM ================= */
        .panel-setting {
            position: fixed;
            top: 0; bottom: 0; left: 0; right: 0;
            background: #121212;
            z-index: 10000;
            padding: 20px;
            overflow-y: auto;
            display: none;
            text-align: left;
        }
        .panel-setting.active { display: block; }
        .setting-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #d4af37; padding-bottom: 10px; margin-bottom: 20px; }
        .setting-header h2 { margin: 0; color: #d4af37; }
        .btn-close-setting { background: #c0392b; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .btn-bluetooth {
            background: #2980b9; color: white; border: none; padding: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 15px; width: 100%; box-shadow: 0 4px 10px rgba(41, 128, 185, 0.3); margin-bottom: 25px;
        }
        .btn-bluetooth.connected { background: #27ae60; box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3); }

        .form-tambah-menu { background: #1e1e1e; border: 1px solid #333; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .form-tambah-menu h4 { margin: 0 0 10px 0; color: #d4af37; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
        .form-group label { font-size: 13px; color: #aaa; }
        .form-input { background: #000; border: 1px solid #d4af37; padding: 10px; border-radius: 6px; color: white; font-size: 14px; }
        .btn-simpan-menu { background: #27ae60; color: white; border: none; padding: 10px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 14px; }

        .crud-item-row { display: flex; justify-content: space-between; align-items: center; background: #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #d4af37; }
        .crud-item-info { display: flex; flex-direction: column; }
        .crud-item-nama { font-weight: bold; }
        .crud-item-harga { font-size: 12px; color: #d4af37; margin-top: 2px; }

        #struk { display: none; }
    </style>
</head>
<body>

    <div class="bali-header">
        <div class="bali-header-text">
            <h1>WARUNG BJM</h1>
            <p>✨ Badung Jaya Mesari ✨</p>
        </div>
        <button class="btn-setting-buka" onclick="bukaPanelSetting()">⚙️</button>
    </div>
    
    <div class="menu-container" id="wadah-menu-utama"></div>
    
    <div class="box-keranjang-layar">
        <h4>🛒 Daftar Pesanan Mama:</h4>
        <div id="list-keranjang-layar">
            <span style="color: #666; font-size: 13px;">Belum ada menu yang dipilih...</span>
        </div>
    </div>
    
    <div class="box-total">
        <h2>TOTAL: <span id="total-layar">Rp 0</span></h2>
    </div>
    
    <button class="btn-bayar" onclick="siapkanDanPrint()">🔥 BAYAR & PRINT</button>


    <div class="panel-setting" id="panel-setting-admin">
        <div class="setting-header">
            <h2>⚙️ Pengaturan Kasir BJM</h2>
            <button class="btn-close-setting" onclick="tutupPanelSetting()">❌ Tutup</button>
        </div>

        <h3>🔌 Hubungkan Printer Thermal</h3>
        <button id="btn-connect" class="btn-bluetooth" onclick="hubungkanPrinterDirect()">🔌 KONEKSI BLUETOOTH (RPPO2N)</button>

        <hr style="border: 1px solid #333; margin: 20px 0;">

        <h3>🍱 Kelola Daftar Menu Jualan</h3>
        <div class="form-tambah-menu">
            <h4>➕ Tambah Menu Baru</h4>
            <div class="form-group">
                <label>Nama Menu (Contoh: Es Teh Manis)</label>
                <input type="text" id="input-nama-menu" class="form-input" placeholder="Ketik nama makanan/minuman...">
            </div>
            <div class="form-group">
                <label>Harga Jual (Angka Saja, Contoh: 5000)</label>
                <input type="number" id="input-harga-menu" class="form-input" placeholder="Contoh: 5000">
            </div>
            <button class="btn-simpan-menu" onclick="simpanMenuBaru()">💾 Masukkan ke Aplikasi</button>
        </div>

        <h4>📋 Daftar Menu Saat Ini (Klik ❌ untuk Hapus):</h4>
        <div id="crud-list-menu"></div>
    </div>


    <script>
        // Menu default bawaan warung saat pertama kali aplikasi dibuka
        const menuAwal = [
            { nama: 'Sate Babi K.asem', harga: 2500 },
            { nama: 'Tum Babi', harga: 3000 },
            { nama: 'Pesan Tlengis', harga: 2500 },
            { nama: 'Balah Babi', harga: 30000 },
            { nama: 'Paru (Kotak)', harga: 50000 }
        ];

        let databaseMenu = [];
        let keranjang = [];
        let totalHarga = 0;
        let printerCharacteristic = null;

        // FUNGSI LOAD DATA MENU DARI LOCALSTORAGE BIAR GAK HILANG PAS REFRESH
        function muatDataMenuAplikasi() {
            let dataLokal = localStorage.getItem('BJM_MENU_DATA');
            if (dataLokal) {
                databaseMenu = JSON.parse(dataLokal);
            } else {
                databaseMenu = [...menuAwal];
                localStorage.setItem('BJM_MENU_DATA', JSON.stringify(databaseMenu));
            }
            renderMenuUtama();
            renderCrudListMenuSetting();
        }

        // TAMPILKAN MENU DI HALAMAN DEPAN UNTUK MAMA KLIK
        function renderMenuUtama() {
            let wadah = document.getElementById('wadah-menu-utama');
            wadah.innerHTML = '';
            databaseMenu.forEach(item => {
                wadah.innerHTML += `
                    <button class="btn-barang" onclick="tambahKeKeranjang('${item.nama}', ${item.harga})">
                        <span>🍢 ${item.nama}</span>
                        <span class="badge-harga">${item.harga.toLocaleString('id-ID')}</span>
                    </button>
                `;
            });
        }

        // TAMPILKAN LIST DI HALAMAN PENGATURAN BUAT DIHAPUS-HAPUS
        function renderCrudListMenuSetting() {
            let wadah = document.getElementById('crud-list-menu');
            wadah.innerHTML = '';
            databaseMenu.forEach((item, index) => {
                wadah.innerHTML += `
                    <div class="crud-item-row">
                        <div class="crud-item-info">
                            <span class="crud-item-nama">${item.nama}</span>
                            <span class="crud-item-harga">Rp ${item.harga.toLocaleString('id-ID')}</span>
                        </div>
                        <button class="btn-hapus-item" onclick="hapusMenuDariAplikasi(${index})">❌ Hapus</button>
                    </div>
                `;
            });
        }

        // FUNGSI TAMBAH MENU BARU
        function simpanMenuBaru() {
            let nama = document.getElementById('input-nama-menu').value.trim();
            let harga = parseInt(document.getElementById('input-harga-menu').value);

            if (!nama || isNaN(harga) || harga <= 0) {
                alert("Isi nama menu dan harga yang bener ya, Gilby!");
                return;
            }

            databaseMenu.push({ nama: nama, harga: harga });
            localStorage.setItem('BJM_MENU_DATA', JSON.stringify(databaseMenu));
            
            // Reset input form
            document.getElementById('input-nama-menu').value = '';
            document.getElementById('input-harga-menu').value = '';
            
            // Refresh semua layar
            muatDataMenuAplikasi();
            alert(`Mantap! Menu "${nama}" sukses terdaftar di aplikasi.`);
        }

        // FUNGSI HAPUS MENU JUALAN
        function hapusMenuDariAplikasi(index) {
            let konfirmasi = confirm(`Gilby yakin mau menghapus menu "${databaseMenu[index].nama}"?`);
            if (konfirmasi) {
                databaseMenu.splice(index, 1);
                localStorage.setItem('BJM_MENU_DATA', JSON.stringify(databaseMenu));
                muatDataMenuAplikasi();
            }
        }

        // CONTROL NAVIGASI PANEL SETTING
        function bukaPanelSetting() { document.getElementById('panel-setting-admin').classList.add('active'); }
        function tutupPanelSetting() { document.getElementById('panel-setting-admin').classList.remove('active'); }

        // ================= KONEKSI BLUETOOTH DIRECT RPPO2N =================
        async function hubungkanPrinterDirect() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'RPPO2N' }],
                    optionalServices: ['00001101-0000-1000-8000-00805f9b34fb', '0000ff00-0000-1000-8000-00805f9b34fb'] 
                });

                const btn = document.getElementById('btn-connect');
                btn.innerText = "⏳ Sedang Menyambungkan...";

                const server = await device.gatt.connect();
                const services = await server.getPrimaryServices();
                let targetService = services[0]; 
                
                const characteristics = await targetService.getCharacteristics();
                printerCharacteristic = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);

                if (printerCharacteristic) {
                    btn.innerText = "✅ PRINTER RPPO2N TERSAMBUNG!";
                    btn.className = "btn-bluetooth connected";
                    alert("Printer RPPO2N Berhasil Tersambung Tanpa Jembatan! Suksma!");
                }
            } catch (error) {
                console.error(error);
                document.getElementById('btn-connect').innerText = "❌ GAGAL KONEK, COBA LAGI";
                alert("Gagal terhubung: " + error.message + "\n\nPastikan printer nyala dan password-nya 0000.");
            }
        }

        // ================= SISTEM KERANJANG BELANJA KASIR =================
        function tambahKeKeranjang(nama, harga) {
            let item = keranjang.find(i => i.nama === nama);
            if (item) {
                item.qty += 1;
            } else {
                keranjang.push({ nama: nama, harga: harga, qty: 1 });
            }
            hitungUlangTotal();
        }

        function ubahQty(index, aksiAtauValue) {
            if (aksiAtauValue === '+') {
                keranjang[index].qty += 1;
            } else if (aksiAtauValue === '-') {
                if (keranjang[index].qty > 1) {
                    keranjang[index].qty -= 1;
                }
            } else {
                let val = parseInt(aksiAtauValue);
                if (!isNaN(val) && val > 0) {
                    keranjang[index].qty = val;
                } else {
                    keranjang[index].qty = 1;
                }
            }
            hitungUlangTotal();
        }

        function hitungUlangTotal() {
            totalHarga = 0;
            let layarKeranjang = document.getElementById('list-keranjang-layar');
            
            if(keranjang.length === 0) {
                layarKeranjang.innerHTML = `<span style="color: #666; font-size: 13px;">Belum ada menu yang dipilih...</span>`;
                document.getElementById('total-layar').innerText = 'Rp 0';
                return;
            }

            layarKeranjang.innerHTML = '';
            keranjang.forEach((item, index) => {
                let subtotal = item.harga * item.qty;
                totalHarga += subtotal;
                
                layarKeranjang.innerHTML += `
                    <div class="item-row item-keranjang-layar">
                        <span>🍢 <b>${item.nama}</b></span>
                        <div class="qty-control">
                            <button class="btn-qty" onclick="ubahQty(${index}, '-')">-</button>
                            <input type="number" class="input-qty" value="${item.qty}" onchange="ubahQty(${index}, this.value)" onclick="this.select()">
                            <button class="btn-qty" onclick="ubahQty(${index}, '+')">+</button>
                            <span style="color:#d4af37; margin: 0 5px 0 10px; font-weight:bold; min-width:70px; text-align:right;">Rp ${subtotal.toLocaleString('id-ID')}</span>
                            <button class="btn-hapus-item" onclick="hapusPesanan(${index})">❌</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-layar').innerText = 'Rp ' + totalHarga.toLocaleString('id-ID');
        }

        function hapusPesanan(index) {
            keranjang.splice(index, 1);
            hitungUlangTotal();
        }

        // ================= DIRECT CEK / PRINT BLUETOOTH =================
        async function siapkanDanPrint() {
            if (keranjang.length === 0) {
                alert('Keranjang masih kosong, Gilby!');
                return;
            }

            if (!printerCharacteristic) {
                alert('⚠️ Hubungkan Printer dulu di halaman Pengaturan (klik ikon ⚙️ di pojok kanan atas).');
                return;
            }

            let teksStruk = "";
            teksStruk += "          WARUNG BJM          \n";
            teksStruk += "    Suksma, Kuliner Khas Bali   \n";
            teksStruk += "================================\n";
            teksStruk += `Tgl: ${new Date().toLocaleDateString('id-ID')} ${new Date().toLocaleTimeString('id-ID')}\n`;
            teksStruk += "--------------------------------\n";
            
            keranjang.forEach(item => {
                let subtotal = item.harga * item.qty;
                teksStruk += `${item.nama}\n`;
                let rincianKiri = `  ${item.qty}x @${item.harga.toLocaleString('id-ID')}`;
                let rincianKanan = `Rp ${subtotal.toLocaleString('id-ID')}`;
                let sisaSpasi = 32 - (rincianKiri.length + rincianKanan.length);
                if (sisaSpasi < 1) sisaSpasi = 1;
                teksStruk += rincianKiri + " ".repeat(sisaSpasi) + rincianKanan + "\n";
            });

            teksStruk += "--------------------------------\n";
            let totalTeks = `TOTAL NYA: Rp ${totalHarga.toLocaleString('id-ID')}`;
            teksStruk += " ".repeat(32 - totalTeks.length) + totalTeks + "\n";
            teksStruk += "================================\n";
            teksStruk += "          Matur Suksma!         \n";
            teksStruk += "    Semoga Hari Anda Cerah!     \n";
            teksStruk += "\n\n\n\n"; 

            try {
                const encoder = new TextEncoder();
                const dataBiner = encoder.encode(teksStruk);
                const ukuranMaksimalPaket = 20; 
                for (let i = 0; i < dataBiner.length; i += ukuranMaksimalPaket) {
                    const paketKecil = dataBiner.slice(i, i + ukuranMaksimalPaket);
                    await printerCharacteristic.writeValue(paketKecil);
                }
                keranjang = [];
                hitungUlangTotal();
            } catch (error) {
                console.error(error);
                alert("Gagal kirim data ke printer bray! Buka Pengaturan lalu sambungkan lagi.");
            }
        }

        // JALANKAN PROSES DATABASE SAAT APLIKASI PERTAMA KALI DI-LOAD
        window.onload = muatDataMenuAplikasi;
    </script>
</body>
</html>
