<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warung BJM - Premium POS</title>
    <style>
        /* ================= TAMPILAN PREMIUM BALI UTAMA ================= */
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            text-align: center; 
            background: #121212; 
            color: #fff;
            padding: 15px; 
            margin: 0; 
            min-height: 100vh;
            -webkit-user-select: none;
            user-select: none;
        }
        
        .bali-header {
            background: linear-gradient(180deg, #d4af37 0%, #aa7c11 100%);
            color: #111;
            padding: 15px 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
        }
        .bali-header h1 { margin: 0; font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .bali-header p { margin: 3px 0 0 0; font-size: 12px; font-weight: bold; }

        /* TOMBOL KONEKSI BLUETOOTH */
        .btn-bluetooth {
            background: #2980b9;
            color: white;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 8px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 4px 10px rgba(41, 128, 185, 0.3);
        }
        .btn-bluetooth.connected {
            background: #27ae60;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        }

        .menu-container { display: flex; flex-direction: column; gap: 10px; max-width: 480px; margin: 0 auto; }
        
        .btn-barang { 
            font-size: 16px; 
            padding: 16px; 
            background: #1e1e1e;
            color: white; 
            border: 2px solid #d4af37; 
            border-radius: 12px; 
            font-weight: bold; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 66px rgba(0,0,0,0.2);
            cursor: pointer;
        }
        .badge-harga { background: #d4af37; color: #111; padding: 4px 8px; border-radius: 6px; font-size: 14px; font-weight: 900; }

        /* DAFTAR KERANJANG DI LAYAR HP MAMA */
        .box-keranjang-layar {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            max-width: 450px;
            margin: 20px auto 10px auto;
            padding: 15px;
            text-align: left;
        }
        .box-keranjang-layar h4 { margin: 0 0 10px 0; color: #d4af37; border-bottom: 1px solid #333; padding-bottom: 5px; font-size: 16px; }
        
        .item-keranjang-layar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #333;
        }
        
        .qty-control {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .btn-qty {
            background: #d4af37;
            color: #111;
            border: none;
            padding: 5px 10px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        .input-qty {
            width: 45px;
            text-align: center;
            background: #000;
            color: #00f2fe;
            border: 1px solid #d4af37;
            padding: 4px;
            font-weight: bold;
            font-size: 14px;
            border-radius: 4px;
        }

        .btn-hapus-item {
            background: #c0392b;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
            margin-left: 5px;
        }

        .box-total { 
            background: #1a1a1a;
            border: 2px dashed #d4af37;
            padding: 15px; 
            border-radius: 12px; 
            max-width: 450px;
            margin: 10px auto; 
        }
        .box-total h2 { margin: 0; font-size: 22px; }
        #total-layar { color: #d4af37; font-weight: 900; }
        
        .btn-bayar { 
            font-size: 20px; 
            padding: 16px; 
            max-width: 480px;
            width: 100%;
            margin-top: 10px;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: #111; 
            border: none; 
            border-radius: 30px; 
            font-weight: 900; 
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.3);
            cursor: pointer;
        }

        #struk { display: none; }
    </style>
</head>
<body>

    <div class="bali-header">
        <h1>WARUNG BJM</h1>
        <p>✨ Suksma, Angkul-Angkul Kuliner Bali ✨</p>
    </div>

    <!-- Tombol Bluetooth Baru Mandiri Tanpa Jembatan -->
    <button id="btn-connect" class="btn-bluetooth" onclick="hubungkanPrinterDirect()">🔌 HUBUNKAN PRINTER (RPPO2N)</button>
    
    <div class="menu-container">
        <button class="btn-barang" onclick="tambahKeKeranjang('Sate Babi K.asem', 2500)">
            <span>🍢 Sate Babi Karangasem</span>
            <span class="badge-harga">2.500</span>
        </button>
        <button class="btn-barang" onclick="tambahKeKeranjang('Tum Babi', 3000)">
            <span>🥩 Tum Babi Khas Bali</span>
            <span class="badge-harga">3.000</span>
        </button>
        <button class="btn-barang" onclick="tambahKeKeranjang('Pesan Tlengis', 2500)">
            <span>🥥 Pesan Tlengis</span>
            <span class="badge-harga">2.500</span>
        </button>
        <button class="btn-barang" onclick="tambahKeKeranjang('Balah Babi', 30000)">
            <span>🛍️ Balah Babi /Plastik</span>
            <span class="badge-harga">30.000</span>
        </button>
        <button class="btn-barang" onclick="tambahKeKeranjang('Paru (Kotak)', 50000)">
            <span>🍱 Paru Spesial /Kotak</span>
            <span class="badge-harga">50.000</span>
        </button>
    </div>
    
    <div class="box-keranjang-layar">
        <h4>🛒 Daftar Pesanan Mama:</h4>
        <div id="list-keranjang-layar">
            <span style="color: #666; font-size: 13px;">Belum ada menu yang dipilih...</span>
        </div>
    </div>
    
    <div class="box-total">
        <h2>TOTAL: <span id="total-layar">Rp 0</span></h2>
    </div>
    
    <button class="btn-bayar" onclick="siapkanDanPrint()">🔥 BAYAR & PRINT</button>

    <script>
        let keranjang = [];
        let totalHarga = 0;
        
        // Variabel Penyimpan Koneksi Hardware Bluetooth Printer
        let printerCharacteristic = null;

        // FUNGSI UTAMA MENGHUBUNGKAN PRINTER LANGSUNG DARI WEB CHROME/SAFARI
        async function hubungkanPrinterDirect() {
            try {
                console.log('Mencari perangkat bluetooth...');
                // Memfilter pencarian khusus untuk printer thermal RPPO2N
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'RPPO2N' }],
                    optionalServices: ['00001101-0000-1000-8000-00805f9b34fb', '0000ff00-0000-1000-8000-00805f9b34fb'] 
                });

                const btn = document.getElementById('btn-connect');
                btn.innerText = "⏳ Sedang Menyambungkan...";

                // Menghubungkan ke server Bluetooth GATT perangkat
                const server = await device.gatt.connect();
                
                // Mengambil Service bawaan printer thermal data transfer
                const services = await server.getPrimaryServices();
                let targetService = services[0]; 
                
                // Mengambil Jalur Pengiriman Data (Characteristic)
                const characteristics = await targetService.getCharacteristics();
                printerCharacteristic = characteristics.find(c => c.properties.write || c.properties.writeWithoutResponse);

                if (printerCharacteristic) {
                    btn.innerText = "✅ PRINTER RPPO2N TERSAMBUNG!";
                    btn.className = "btn-bluetooth connected";
                    alert("Keren Gilby! Printer RPPO2N beneran udah terkoneksi langsung via Bluetooth. Siap cetak!");
                } else {
                    throw new Error("Gagal menemukan jalur data printer.");
                }
            } catch (error) {
                console.error(error);
                document.getElementById('btn-connect').innerText = "❌ GAGAL KONEK, COBA LAGI";
                alert("Gagal konek: " + error.message + "\n\nPastikan Bluetooth HP/iPad aktif dan kalau minta password ketik 0000.");
            }
        }

        function tambahKeKeranjang(nama, harga) {
            let item = keranjang.find(i => i.nama === nama);
            if (item) {
                item.qty += 1;
            } else {
                keranjang.push({ nama: nama, harga: harga, qty: 1 });
            }
            hitungUlangTotal();
        }

        function ubahQty(index, aksiAtauValue) {
            if (aksiAtauValue === '+') {
                keranjang[index].qty += 1;
            } else if (aksiAtauValue === '-') {
                if (keranjang[index].qty > 1) {
                    keranjang[index].qty -= 1;
                }
            } else {
                let val = parseInt(aksiAtauValue);
                if (!isNaN(val) && val > 0) {
                    keranjang[index].qty = val;
                } else {
                    keranjang[index].qty = 1;
                }
            }
            hitungUlangTotal();
        }

        function hitungUlangTotal() {
            totalHarga = 0;
            let layarKeranjang = document.getElementById('list-keranjang-layar');
            
            if(keranjang.length === 0) {
                layarKeranjang.innerHTML = `<span style="color: #666; font-size: 13px;">Belum ada menu yang dipilih...</span>`;
                document.getElementById('total-layar').innerText = 'Rp 0';
                return;
            }

            layarKeranjang.innerHTML = '';
            keranjang.forEach((item, index) => {
                let subtotal = item.harga * item.qty;
                totalHarga += subtotal;
                
                layarKeranjang.innerHTML += `
                    <div class="item-row item-keranjang-layar">
                        <span>🍢 <b>${item.nama}</b></span>
                        <div class="qty-control">
                            <button class="btn-qty" onclick="ubahQty(${index}, '-')">-</button>
                            <input type="number" class="input-qty" value="${item.qty}" onchange="ubahQty(${index}, this.value)" onclick="this.select()">
                            <button class="btn-qty" onclick="ubahQty(${index}, '+')">+</button>
                            <span style="color:#d4af37; margin: 0 5px 0 10px; font-weight:bold; min-width:70px; text-align:right;">Rp ${subtotal.toLocaleString('id-ID')}</span>
                            <button class="btn-hapus-item" onclick="hapusPesanan(${index})">❌</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-layar').innerText = 'Rp ' + totalHarga.toLocaleString('id-ID');
        }

        function hapusPesanan(index) {
            keranjang.splice(index, 1);
            hitungUlangTotal();
        }

        // SISTEM TEMBAK PRINT DIRECT VIA BLUETOOTH AIR
        async function siapkanDanPrint() {
            if (keranjang.length === 0) {
                alert('Keranjang masih kosong, Gilby!');
                return;
            }

            if (!printerCharacteristic) {
                alert('⚠️ Printer belum tersambung, Gilby! Silakan klik tombol "HUBUNKAN PRINTER" di atas dulu ya.');
                return;
            }

            // Membangun susunan teks struk belanjaan 32 karakter kertas thermal 58mm
            let teksStruk = "";
            teksStruk += "          WARUNG BJM          \n";
            teksStruk += "    Suksma, Kuliner Khas Bali   \n";
            teksStruk += "================================\n";
            teksStruk += `Tgl: ${new Date().toLocaleDateString('id-ID')} ${new Date().toLocaleTimeString('id-ID')}\n`;
            teksStruk += "--------------------------------\n";
            
            keranjang.forEach(item => {
                let subtotal = item.harga * item.qty;
                teksStruk += `${item.nama}\n`;
                let rincianKiri = `  ${item.qty}x @${item.harga.toLocaleString('id-ID')}`;
                let rincianKanan = `Rp ${subtotal.toLocaleString('id-ID')}`;
                let sisaSpasi = 32 - (rincianKiri.length + rincianKanan.length);
                if (sisaSpasi < 1) sisaSpasi = 1;
                teksStruk += rincianKiri + " ".repeat(sisaSpasi) + rincianKanan + "\n";
            });

            teksStruk += "--------------------------------\n";
            let totalTeks = `TOTAL NYA: Rp ${totalHarga.toLocaleString('id-ID')}`;
            teksStruk += " ".repeat(32 - totalTeks.length) + totalTeks + "\n";
            teksStruk += "================================\n";
            teksStruk += "          Matur Suksma!         \n";
            teksStruk += "    Semoga Hari Anda Cerah!     \n";
            teksStruk += "\n\n\n\n"; // Space potong kertas

            try {
                // Mengubah format string teks biasa menjadi biner ArrayBuffer agar dimengerti printer
                const encoder = new TextEncoder();
                const dataBiner = encoder.encode(teksStruk);
                
                // Proses pemotongan paket data biner agar pengiriman data bluetooth lancar (MTU chunking)
                const ukuranMaksimalPaket = 20; 
                for (let i = 0; i < dataBiner.length; i += ukuranMaksimalPaket) {
                    const paketKecil = dataBiner.slice(i, i + ukuranMaksimalPaket);
                    await printerCharacteristic.writeValue(paketKecil);
                }
                
                console.log("Struk sukses terkirim ke RPPO2N!");
                
                // Reset kasir otomatis setelah sukses cetak
                keranjang = [];
                hitungUlangTotal();
            } catch (error) {
                console.error("Gagal mengirim data print: ", error);
                alert("Aduh, gagal kirim data ke printer bray! Coba klik Hubungkan Printer lagi.");
            }
        }
    </script>
</body>
</html>
